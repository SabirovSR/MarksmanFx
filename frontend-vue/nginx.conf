# ═══════════════════════════════════════════════════════════════════════════════
# Nginx конфигурация для Vue.js SPA (History API) + reverse proxy на Spring Boot
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name localhost;

    # Мы указываем корневую директорию со статикой, собранной Vite
    root  /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────────────────────────────────
    # Gzip-сжатие — уменьшает объём передаваемых данных в 3-5 раз.
    # Включаем здесь, а не в http{} блоке, чтобы не зависеть от глобального конфига.
    # ─────────────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ─────────────────────────────────────────────────────────────────────────
    # Мы проксируем REST API запросы на Spring Boot бэкенд.
    # В docker-compose "backend" — это имя сервиса; Docker DNS резолвит его в IP.
    # Nginx принимает запрос на /api/... и передаёт его на backend:8080/api/...
    # Это исключает CORS: браузер видит один origin, проксирование прозрачно.
    # ─────────────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8080/api/;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Мы отключаем буферизацию для Server-Sent Events (если понадобятся)
        proxy_buffering    off;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Мы проксируем WebSocket-соединения на Spring Boot.
    # Без заголовков Upgrade и Connection браузер не сможет сделать upgrade
    # HTTP → WebSocket — соединение упадёт с ошибкой 400 или 502.
    # ─────────────────────────────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://backend:8080/ws;

        # Мы обязательно указываем HTTP/1.1 — WebSocket не работает поверх HTTP/2
        proxy_http_version 1.1;

        # Эти два заголовка — обязательный минимум для WebSocket upgrade
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host       $host;

        # Мы ставим долгие таймауты: игровая сессия может длиться часами
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Кэширование статических ассетов Vite (JS, CSS, шрифты, изображения).
    #
    # Vite добавляет content hash к имени каждого файла при сборке:
    #   index-DucKg3t9.js, GameView-4YCoobfm.js, index-BNz6F2_f.css
    # Поэтому мы можем кэшировать их на 1 год: при изменении контента
    # имя файла изменится и браузер запросит новую версию.
    #
    # ВАЖНО: Этот location должен быть ВЫШЕ location /, иначе Nginx
    # применит регулярное выражение с более высоким приоритетом, но
    # здесь порядок не критичен — regex (~*) всегда приоритетнее prefix (/).
    # ─────────────────────────────────────────────────────────────────────────
    location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";

        # Мы логируем обращения к статике как access_log off для снижения I/O
        access_log  off;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # SPA-роутинг — КЛЮЧЕВОЙ блок для Vue Router в режиме history.
    #
    # Проблема: при обновлении страницы на /lobby или /game/ABC123 браузер
    # отправляет GET /lobby в Nginx. Файла /lobby не существует на диске —
    # без этой директивы Nginx вернёт 404.
    #
    # Решение: try_files пробует:
    #   $uri        — точное совпадение с файлом (например, /favicon.svg)
    #   $uri/       — директория с index.html (для /assets/ и т.п.)
    #   /index.html — если ничего не найдено — всегда отдаём entry point SPA
    #
    # Vue Router прочитает URL в браузере и сам выполнит нужный переход.
    #
    # ВАЖНО: index.html НЕ кэшируем (нет Cache-Control здесь).
    # Браузер должен всегда проверять его актуальность, иначе после деплоя
    # пользователи будут видеть старую версию приложения.
    # ─────────────────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Мы явно запрещаем кэширование index.html
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }
}
