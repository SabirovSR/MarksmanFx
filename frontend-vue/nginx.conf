# ═══════════════════════════════════════════════════════════════════════════════
# Конфигурация Nginx для Vue.js SPA с проксированием на Spring Boot
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name localhost;

    # Директория со статическими файлами Vue.js
    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────────────────────────────────
    # Мы проксируем REST API запросы на Spring Boot бэкенд.
    # Клиент Vue.js делает запросы на /api/* — Nginx перенаправляет их на backend:8080.
    # Это позволяет избежать CORS: с точки зрения браузера, всё идёт на один origin.
    # ─────────────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты для долгих API запросов
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Мы проксируем WebSocket запросы.
    # Требуются специальные заголовки для апгрейда HTTP → WebSocket.
    # ─────────────────────────────────────────────────────────────────────────
    location /ws {
        proxy_pass http://backend:8080/ws;

        # Эти заголовки обязательны для WebSocket upgrade
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;

        # Долгий таймаут для WebSocket соединений (игровые сессии могут быть длинными)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Vue Router — History Mode.
    # Мы всегда возвращаем index.html для всех маршрутов, кроме статических файлов.
    # Без этого прямой переход на /lobby или /game даст 404 от Nginx.
    # ─────────────────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэширование статических ассетов (JS, CSS, изображения)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip для ускорения загрузки
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
